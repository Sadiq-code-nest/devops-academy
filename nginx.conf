# ═══════════════════════════════════════════════════════════
#  DevOps Academy — Nginx Configuration
#  Serves static files + health endpoint + security headers
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Health Check Endpoint ────────────────────────────────
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"devops-academy","timestamp":"$time_iso8601"}';
    }

    # ── Static Assets (aggressive cache) ────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback (for client-side routing) ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hide Nginx version ───────────────────────────────────
    server_tokens off;

    # ── Deny hidden files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Structured access log ────────────────────────────────
    log_format structured '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time';
    access_log /var/log/nginx/access.log structured;
    error_log  /var/log/nginx/error.log warn;
}
