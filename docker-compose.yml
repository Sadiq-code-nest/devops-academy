# ═══════════════════════════════════════════════════════════
#  DevOps Academy — Docker Compose
#  Usage:
#    docker compose up -d          → start (detached)
#    docker compose down           → stop
#    docker compose logs -f        → tail logs
#    docker compose up -d --build  → rebuild & restart
# ═══════════════════════════════════════════════════════════

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sadiqaws24/devops-academy:latest
    container_name: devops-academy-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devops-net
    labels:
      - "project=devops-academy"
      - "maintainer=sadiqaws24"

networks:
  devops-net:
    driver: bridge
