# ════════════════════════════════════════════════════
# Docker Compose — DevOps Academy
# Usage:
#   docker compose up -d          # run locally
#   docker compose down           # stop
#   docker compose logs -f        # follow logs
# ════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Web App (static site via Nginx) ────────────────
  web:
    image: ${DOCKER_IMAGE:-devops-academy:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: devops-academy-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=false"         # disable if not using Traefik
      - "app=devops-academy"
      - "env=${DEPLOY_ENV:-local}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: devops-academy-net
